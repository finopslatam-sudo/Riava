<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 140" width="140" height="140">
  <defs>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="180" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#193f72"/>
      <stop offset="55%" stop-color="#1b68a8"/>
      <stop offset="100%" stop-color="#0db4cc"/>
    </linearGradient>
    <clipPath id="cloudClip">
      <path d="M 22 118 Q 4 118 4 96 Q 4 75 24 68 Q 16 46 36 37 Q 44 12 72 17 Q 86 2 112 14 Q 134 4 148 24 Q 168 18 170 42 Q 180 46 178 68 Q 176 90 156 92 L 22 118 Z"/>
    </clipPath>
    <!-- topZone covers upper half of overlap: makes cyan ring go OVER white ring at top crossing -->
    <clipPath id="topZone">
      <rect x="76" y="22" width="28" height="36"/>
    </clipPath>
  </defs>

  <path d="M 22 118 Q 4 118 4 96 Q 4 75 24 68 Q 16 46 36 37 Q 44 12 72 17 Q 86 2 112 14 Q 134 4 148 24 Q 168 18 170 42 Q 180 46 178 68 Q 176 90 156 92 L 22 118 Z"
    fill="url(#cloudGrad)"/>

  <g clip-path="url(#cloudClip)">
    <!-- d = r*sqrt(2) = 28*1.414 ≈ 40 → crossing angle = 45°, centers at x=70 and x=110 -->
    <!-- Intersections at (90, 38) and (90, 78) -->

    <!-- Right ring (cyan) — drawn behind -->
    <circle cx="110" cy="58" r="28" fill="none" stroke="#1ad4f0" stroke-width="10" stroke-opacity="0.95"/>
    <!-- Left ring (white) — drawn on top, covers cyan at both crossings -->
    <circle cx="70" cy="58" r="28" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="10"/>
    <!-- Right ring re-drawn clipped to top zone → cyan appears OVER white at top crossing (90,38) -->
    <circle cx="110" cy="58" r="28" clip-path="url(#topZone)" fill="none" stroke="#1ad4f0" stroke-width="10" stroke-opacity="0.95"/>
  </g>
</svg>
